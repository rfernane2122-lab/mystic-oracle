<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mystic Oracle</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cinzel:wght@400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--bg:#080810;--surface:#0d0d1a;--surface2:#12121f;--border:rgba(160,140,255,0.12);--border2:rgba(160,140,255,0.25);--gold:#c9a84c;--gold2:#e8c97a;--purple:#9b87f5;--purple2:#c4b5fd;--muted:rgba(200,195,230,0.5);--text:#ede9f8;--dim:rgba(200,195,230,0.35);--teal:#5eead4;--coral:#f87171;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Cormorant Garamond',serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 10%,rgba(120,80,255,0.08) 0%,transparent 60%),radial-gradient(ellipse 50% 30% at 80% 80%,rgba(80,160,200,0.06) 0%,transparent 50%);pointer-events:none;z-index:0}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;border-radius:50%;background:white;animation:twinkle var(--dur) ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:var(--min)}50%{opacity:var(--max)}}
.app{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:2rem 1.5rem 4rem}
header{text-align:center;padding:3rem 0 2rem;margin-bottom:2rem}
.logo{font-size:48px;animation:float 6s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
header h1{font-family:'Cinzel',serif;font-size:clamp(28px,5vw,44px);font-weight:400;letter-spacing:0.15em;background:linear-gradient(135deg,var(--gold),var(--purple2),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:0.5rem}
header p{font-size:15px;color:var(--muted);font-style:italic}
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2rem;margin-bottom:2rem}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.form-group{display:flex;flex-direction:column;gap:0.4rem}
.form-group.full{grid-column:1/-1}
label{font-size:11px;letter-spacing:0.12em;color:var(--muted);font-family:'Cinzel',serif;text-transform:uppercase}
input,select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Cormorant Garamond',serif;font-size:16px;padding:0.7rem 1rem;outline:none;transition:border-color 0.2s;width:100%}
input:focus{border-color:var(--border2)}
input::placeholder{color:var(--dim)}
.city-wrap{position:relative}
.suggestions{display:none;position:absolute;top:100%;left:0;right:0;background:var(--surface2);border:1px solid var(--border2);border-top:none;border-radius:0 0 8px 8px;z-index:100;max-height:220px;overflow-y:auto}
.sug-item{padding:0.65rem 1rem;font-size:14px;cursor:pointer;color:var(--text);border-bottom:1px solid var(--border);transition:background 0.15s}
.sug-item:last-child{border-bottom:none}
.sug-item:hover,.sug-item.hi{background:rgba(155,135,245,0.12);color:var(--purple2)}
.city-status{font-size:12px;color:var(--muted);margin-top:4px;font-style:italic;min-height:16px}
.city-ok{color:var(--teal)!important}
.city-err{color:var(--coral)!important}
.btn{width:100%;padding:1rem;margin-top:1.5rem;background:linear-gradient(135deg,rgba(155,135,245,0.2),rgba(201,168,76,0.15));border:1px solid var(--border2);border-radius:10px;color:var(--gold2);font-family:'Cinzel',serif;font-size:13px;letter-spacing:0.15em;cursor:pointer;transition:all 0.3s}
.btn:hover{background:linear-gradient(135deg,rgba(155,135,245,0.3),rgba(201,168,76,0.25))}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.results{display:none;animation:fadeIn 0.5s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.sys-tabs{display:flex;gap:0.5rem;margin-bottom:1.5rem;flex-wrap:wrap}
.sys-tab{padding:0.4rem 1rem;border:1px solid var(--border);border-radius:20px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.1em;color:var(--dim);cursor:pointer;background:transparent;transition:all 0.2s}
.sys-tab.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,0.08)}
.sys-tab:hover:not(.active){color:var(--text);border-color:var(--border2)}
.panel{display:none}
.panel.active{display:block}
.section{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.75rem;margin-bottom:1.25rem}
.sec-title{font-family:'Cinzel',serif;font-size:12px;letter-spacing:0.15em;color:var(--gold);margin-bottom:1.25rem;display:flex;align-items:center;gap:10px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}
.planet-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:0.6rem}
.planet-row{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:0.6rem 0.85rem;display:flex;align-items:center;gap:10px}
.p-glyph{font-size:18px;width:24px;text-align:center;flex-shrink:0}
.p-name{font-size:12px;color:var(--muted);width:72px;flex-shrink:0;font-family:'DM Mono',monospace}
.p-pos{font-size:15px;font-weight:300}
.p-house{font-size:11px;color:var(--dim);margin-left:auto;font-family:'DM Mono',monospace}
.bal-row{margin-bottom:0.5rem;display:flex;align-items:center;gap:10px}
.bal-label{width:50px;font-size:10px;color:var(--muted);font-family:'Cinzel',serif;letter-spacing:0.08em}
.bal-track{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.bal-fill{height:100%;border-radius:3px}
.bal-count{width:20px;text-align:right;font-size:12px;color:var(--dim);font-family:'DM Mono',monospace}
.big3{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1.5rem}
.big3-card{background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:0.75rem 1.25rem;font-size:16px;color:var(--gold2)}
.nak-box{background:linear-gradient(135deg,rgba(155,135,245,0.08),rgba(94,234,212,0.05));border:1px solid var(--border2);border-radius:10px;padding:1.25rem;margin-bottom:1rem}
.nak-name{font-size:22px;font-weight:300;color:var(--purple2);margin-bottom:4px}
.nak-meta{font-size:13px;color:var(--muted)}
.pillars{display:grid;grid-template-columns:repeat(4,1fr);gap:0.75rem}
.pillar{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:1rem;text-align:center}
.pillar-lbl{font-size:10px;color:var(--dim);letter-spacing:0.1em;font-family:'Cinzel',serif;margin-bottom:8px;text-transform:uppercase}
.pillar-stem{font-size:18px;font-weight:300;color:var(--gold2);line-height:1.2}
.pillar-branch{font-size:13px;color:var(--muted);margin-top:4px}
.lp-num{font-family:'Cinzel',serif;font-size:56px;font-weight:400;background:linear-gradient(135deg,var(--gold),var(--purple2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin:0.5rem 0}
.lp-label{text-align:center;font-size:16px;font-style:italic;color:var(--muted)}
.ai-section{background:linear-gradient(135deg,rgba(155,135,245,0.06),rgba(201,168,76,0.04));border:1px solid var(--border2);border-radius:16px;padding:2rem;margin-top:1.25rem}
.ai-loading{text-align:center;padding:2rem;color:var(--muted);font-style:italic}
.ai-text{font-size:17px;line-height:1.85;color:var(--text);white-space:pre-wrap;font-weight:300}
.chat-msgs{display:flex;flex-direction:column;gap:1rem;margin-bottom:1rem;max-height:400px;overflow-y:auto;padding:1rem;background:var(--surface2);border-radius:10px;border:1px solid var(--border)}
.msg-o{align-self:flex-start;max-width:85%}
.msg-u{align-self:flex-end;max-width:80%}
.bubble{padding:0.85rem 1.1rem;border-radius:12px;font-size:15px;line-height:1.7}
.b-o{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px}
.b-u{background:rgba(155,135,245,0.2);border:1px solid var(--border2);border-bottom-right-radius:4px;text-align:right}
.chat-row{display:flex;gap:0.75rem}
.chat-row input{flex:1}
.chat-send{padding:0.7rem 1.25rem;background:rgba(155,135,245,0.15);border:1px solid var(--border2);border-radius:8px;color:var(--purple2);font-family:'Cinzel',serif;font-size:11px;cursor:pointer;letter-spacing:0.08em;transition:all 0.2s;white-space:nowrap}
.chat-send:hover{background:rgba(155,135,245,0.25)}
.chat-send:disabled{opacity:0.4;cursor:not-allowed}
.dots{display:inline-flex;gap:3px;align-items:center}
.dot{width:5px;height:5px;border-radius:50%;background:var(--muted);animation:blink 1.2s infinite}
.dot:nth-child(2){animation-delay:0.2s}.dot:nth-child(3){animation-delay:0.4s}
@keyframes blink{0%,80%,100%{opacity:0.2}40%{opacity:1}}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}.pillars{grid-template-columns:repeat(2,1fr)}.planet-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="app">
  <header>
    <div class="logo">✦</div>
    <h1>Mystic Oracle</h1>
    <p>Western · Vedic · Bazi · Saju · Numerology</p>
  </header>

  <div class="form-card">
    <div class="form-grid">
      <div class="form-group full">
        <label>Your Name (optional)</label>
        <input type="text" id="name" placeholder="For numerology reading">
      </div>
      <div class="form-group">
        <label>Date of Birth</label>
        <input type="date" id="birth-date" value="1990-03-15">
      </div>
      <div class="form-group">
        <label>Time of Birth (local time)</label>
        <input type="time" id="birth-time" value="14:30">
      </div>
      <div class="form-group full">
        <label>City of Birth</label>
        <div class="city-wrap">
          <input type="text" id="city-input" placeholder="Type any city in the world..." autocomplete="off" oninput="onCityInput()" onkeydown="onCityKey(event)">
          <div class="suggestions" id="suggestions"></div>
        </div>
        <div class="city-status" id="city-status"></div>
        <input type="hidden" id="lat">
        <input type="hidden" id="lon">
      </div>
    </div>
    <button class="btn" id="calc-btn" onclick="calcChart()">✦ REVEAL MY COSMIC BLUEPRINT ✦</button>
  </div>

  <div class="results" id="results">
    <div class="sys-tabs">
      <button class="sys-tab active" onclick="showPanel('western',this)">Western</button>
      <button class="sys-tab" onclick="showPanel('vedic',this)">Vedic</button>
      <button class="sys-tab" onclick="showPanel('chinese',this)">Bazi / Chinese</button>
      <button class="sys-tab" onclick="showPanel('saju',this)">Saju / Korean</button>
      <button class="sys-tab" onclick="showPanel('numerology',this)">Numerology</button>
      <button class="sys-tab" onclick="showPanel('ai',this)">AI Oracle</button>
    </div>

    <div class="panel active" id="panel-western">
      <div class="section">
        <div class="sec-title">Sun · Moon · Rising</div>
        <div class="big3" id="big3"></div>
        <div class="sec-title">Elements</div>
        <div id="elements"></div>
        <div class="sec-title" style="margin-top:1.25rem">All Planets</div>
        <div class="planet-grid" id="planets"></div>
      </div>
    </div>

    <div class="panel" id="panel-vedic">
      <div class="section">
        <div class="sec-title">Nakshatra</div>
        <div class="nak-box" id="nakshatra"></div>
        <div class="sec-title">Vedic Signs</div>
        <div id="vedic-signs" style="font-size:15px;color:var(--muted);line-height:2"></div>
      </div>
    </div>

    <div class="panel" id="panel-chinese">
      <div class="section">
        <div class="sec-title">四柱 Four Pillars (Bazi)</div>
        <div class="pillars" id="bazi"></div>
      </div>
    </div>

    <div class="panel" id="panel-saju">
      <div class="section">
        <div class="sec-title">사주 Saju — Day Master</div>
        <div style="padding:1.25rem;background:var(--surface2);border-radius:10px;border:1px solid var(--border)">
          <div style="font-size:11px;color:var(--dim);font-family:'Cinzel',serif;letter-spacing:0.1em;margin-bottom:8px">DAY MASTER (일간)</div>
          <div style="font-size:24px;font-weight:300;color:var(--gold2)" id="day-master"></div>
        </div>
      </div>
    </div>

    <div class="panel" id="panel-numerology">
      <div class="section" style="text-align:center">
        <div class="sec-title">Life Path Number</div>
        <div class="lp-num" id="lp-num"></div>
        <div class="lp-label" id="lp-label"></div>
      </div>
    </div>

    <div class="panel" id="panel-ai">
      <div class="ai-section">
        <div class="sec-title">✦ Oracle Reading</div>
        <div id="ai-content"><div class="ai-loading"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><div style="margin-top:8px">The oracle reads the stars...</div></div></div>
      </div>
      <div class="section" style="margin-top:1rem">
        <div class="sec-title">Ask the Oracle</div>
        <div class="chat-msgs" id="chat-msgs"></div>
        <div class="chat-row">
          <input type="text" id="chat-input" placeholder="Ask about love, career, destiny..." onkeydown="if(event.key==='Enter')sendChat()">
          <button class="chat-send" id="chat-btn" onclick="sendChat()">Ask ✦</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// Stars
(function(){const c=document.getElementById('stars');for(let i=0;i<100;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*2+0.5;s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${2+Math.random()*4}s;--min:${0.05+Math.random()*0.1};--max:${0.4+Math.random()*0.5};animation-delay:${Math.random()*4}s`;c.appendChild(s)}})();

const GLYPHS={Sun:'☉',Moon:'☽',Mercury:'☿',Venus:'♀',Mars:'♂',Jupiter:'♃',Saturn:'♄',Uranus:'♅',Neptune:'♆',Pluto:'♇','North Node':'☊','South Node':'☋',Ascendant:'AC',Midheaven:'MC'};
const ECOLORS={Fire:'#f87171',Earth:'#c9a84c',Air:'#c4b5fd',Water:'#5eead4'};

let chartData=null,chatHistory=[];

// ── CITY SEARCH via backend ──────────────────────────────────────────────────
let cityTimer=null,suggestions=[],hiIdx=-1;

function onCityInput(){
  const q=document.getElementById('city-input').value.trim();
  document.getElementById('lat').value='';
  document.getElementById('lon').value='';
  document.getElementById('city-status').textContent='';
  document.getElementById('city-status').className='city-status';
  clearTimeout(cityTimer);
  if(q.length<2){hideSug();return}
  cityTimer=setTimeout(()=>fetchCities(q),400);
}

async function fetchCities(q){
  document.getElementById('city-status').textContent='Searching...';
  try{
    const res=await fetch(`/geocode?city=${encodeURIComponent(q)}`);
    const data=await res.json();
    suggestions=data.filter(r=>r.lat&&r.lon);
    renderSug(suggestions);
    document.getElementById('city-status').textContent=suggestions.length?'':'No city found. Try again.';
  }catch(e){
    document.getElementById('city-status').textContent='Search error. Try again.';
  }
}

function renderSug(items){
  const box=document.getElementById('suggestions');
  if(!items.length){hideSug();return}
  box.innerHTML=items.map((r,i)=>`<div class="sug-item" onclick="selectCity(${i})" onmouseover="setHi(${i})">${r.label}</div>`).join('');
  box.style.display='block';hiIdx=-1;
}

function hideSug(){document.getElementById('suggestions').style.display='none';suggestions=[];hiIdx=-1}

function setHi(i){hiIdx=i;document.querySelectorAll('.sug-item').forEach((el,j)=>el.classList.toggle('hi',j===i))}

function selectCity(i){
  const r=suggestions[i];if(!r)return;
  document.getElementById('city-input').value=r.label;
  document.getElementById('lat').value=r.lat;
  document.getElementById('lon').value=r.lon;
  document.getElementById('city-status').textContent=`✦ ${r.label}`;
  document.getElementById('city-status').className='city-status city-ok';
  hideSug();
}

function onCityKey(e){
  const items=document.querySelectorAll('.sug-item');if(!items.length)return;
  if(e.key==='ArrowDown'){e.preventDefault();setHi(Math.min(hiIdx+1,items.length-1))}
  else if(e.key==='ArrowUp'){e.preventDefault();setHi(Math.max(hiIdx-1,0))}
  else if(e.key==='Enter'&&hiIdx>=0){e.preventDefault();selectCity(hiIdx)}
  else if(e.key==='Escape')hideSug();
}
document.addEventListener('click',e=>{if(!e.target.closest('#city-input')&&!e.target.closest('#suggestions'))hideSug()});

// ── CHART CALCULATION ────────────────────────────────────────────────────────
async function calcChart(){
  const dateStr=document.getElementById('birth-date').value;
  const timeStr=document.getElementById('birth-time').value||'12:00';
  const lat=parseFloat(document.getElementById('lat').value);
  const lon=parseFloat(document.getElementById('lon').value);

  if(!dateStr){alert('Please enter your date of birth');return}
  if(isNaN(lat)||isNaN(lon)){
    document.getElementById('city-status').textContent='Please select a city from the list.';
    document.getElementById('city-status').className='city-status city-err';
    return;
  }

  const[yr,mo,day]=dateStr.split('-').map(Number);
  const[hh,mm]=timeStr.split(':').map(Number);
  const hour=hh+(mm||0)/60;

  document.getElementById('calc-btn').disabled=true;
  document.getElementById('calc-btn').textContent='Calculating...';

  try{
    const res=await fetch('/chart',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({year:yr,month:mo,day,hour,lat,lon})
    });
    chartData=await res.json();
    chartData.meta={name:document.getElementById('name').value.trim(),yr,mo,day,hour,lat,lon};
    renderResults();
    document.getElementById('results').style.display='block';
    document.getElementById('calc-btn').textContent='✦ RECALCULATE ✦';
    setTimeout(()=>generateReading(),300);
  }catch(e){
    alert('Calculation error. Please try again.');
    document.getElementById('calc-btn').textContent='✦ REVEAL MY COSMIC BLUEPRINT ✦';
  }
  document.getElementById('calc-btn').disabled=false;
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function renderResults(){
  const d=chartData;
  // Big 3
  document.getElementById('big3').innerHTML=
    [`☉ Sun · ${d.sun_sign}`,`☽ Moon · ${d.moon_sign}`,`⬆ Rising · ${d.rising_sign}`]
    .map(s=>`<div class="big3-card">${s}</div>`).join('');

  // Elements
  const max=Math.max(...Object.values(d.elements),1);
  document.getElementById('elements').innerHTML=
    Object.entries(d.elements).map(([el,cnt])=>
      `<div class="bal-row"><span class="bal-label">${el}</span><div class="bal-track"><div class="bal-fill" style="width:${cnt/max*100}%;background:${ECOLORS[el]}"></div></div><span class="bal-count">${cnt}</span></div>`
    ).join('');

  // Planets
  document.getElementById('planets').innerHTML=
    Object.entries(d.planets).filter(([n])=>n!=='South Node').map(([n,p])=>
      `<div class="planet-row"><span class="p-glyph">${GLYPHS[n]||'·'}</span><span class="p-name">${n}</span><span class="p-pos">${p.degree}° ${p.sign}</span>${p.house?`<span class="p-house">H${p.house}</span>`:''}</div>`
    ).join('');

  // Vedic
  const v=d.vedic;
  document.getElementById('nakshatra').innerHTML=`<div class="nak-name">${v.nakshatra.name}</div><div class="nak-meta">Pada ${v.nakshatra.pada} · Lord: ${v.nakshatra.lord}</div>`;
  document.getElementById('vedic-signs').innerHTML=`Sun (Vedic): <strong style="color:var(--gold2)">${v.sun_sign}</strong> &nbsp;|&nbsp; Moon (Vedic): <strong style="color:var(--gold2)">${v.moon_sign}</strong><br>Ayanamsha: ${v.ayanamsha}°`;

  // Bazi
  const c=d.chinese;
  document.getElementById('bazi').innerHTML=[
    {l:'Year',s:c.year.stem,b:c.year.branch},
    {l:'Month',s:'—',b:'—'},
    {l:'Day',s:c.day.stem,b:c.day.branch},
    {l:'Hour',s:'—',b:'—'}
  ].map(p=>`<div class="pillar"><div class="pillar-lbl">${p.l}</div><div class="pillar-stem">${p.s}</div><div class="pillar-branch">${p.b}</div></div>`).join('');

  // Saju
  document.getElementById('day-master').textContent=d.saju.day_master;

  // Numerology
  document.getElementById('lp-num').textContent=d.numerology.life_path.number;
  document.getElementById('lp-label').textContent=d.numerology.life_path.label;
}

// ── AI READING ───────────────────────────────────────────────────────────────
async function generateReading(){
  if(!chartData)return;
  const d=chartData;
  const prompt=`Give a complete, poetic, and deeply personal astrological reading for ${d.meta.name||'this soul'}.

WESTERN: Sun ${d.sun_sign} (H${d.planets.Sun?.house}) | Moon ${d.moon_sign} (H${d.planets.Moon?.house}) | Rising ${d.rising_sign} | MC ${d.mc_sign}
Mars ${d.planets.Mars?.sign} | Venus ${d.planets.Venus?.sign} | Mercury ${d.planets.Mercury?.sign} | Jupiter ${d.planets.Jupiter?.sign} | Saturn ${d.planets.Saturn?.sign}
Elements: ${JSON.stringify(d.elements)}

VEDIC: Sun ${d.vedic.sun_sign} | Moon ${d.vedic.moon_sign} | Nakshatra ${d.vedic.nakshatra.name} Pada ${d.vedic.nakshatra.pada} (Lord: ${d.vedic.nakshatra.lord})

async function sendChat(){
  const input=document.getElementById('chat-input');
  const msg=input.value.trim();
  if(!msg||!chartData)return;
  input.value='';
  document.getElementById('chat-btn').disabled=true;
  const cm=document.getElementById('chat-msgs');
  cm.innerHTML+=`<div class="msg-u"><div class="bubble b-u">${msg}</div></div>`;
  const lid='l'+Date.now();
  cm.innerHTML+=`<div class="msg-o" id="${lid}"><div class="bubble b-o"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div></div>`;
  cm.scrollTop=cm.scrollHeight;
  chatHistory.push({role:'user',content:msg});
  try{
    const res=await fetch('/oracle',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({system:`You are Celeste, an ancient oracle. You have just read this person's complete birth chart. Continue the conversation with wisdom and depth. Never say you are an AI.`,messages:chatHistory})
    });
    const data=await res.json();
    const reply=data.text||'The oracle is silent.';
    document.getElementById(lid).innerHTML=`<div class="bubble b-o">${reply}</div>`;
    chatHistory.push({role:'assistant',content:reply});
  }catch(e){
    document.getElementById(lid).innerHTML=`<div class="bubble b-o">The connection wavers... Try again.</div>`;
  }
  cm.scrollTop=cm.scrollHeight;
  document.getElementById('chat-btn').disabled=false;
  input.focus();
}

function showPanel(id,btn){
  document.querySelectorAll('.sys-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+id).classList.add('active');
  if(id==='ai'&&chartData&&!document.querySelector('.ai-text'))generateReading();
}
